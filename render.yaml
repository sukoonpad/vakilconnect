# Render.com Blueprint — deploys the zero-dependency VakilConnect server.
services:
  - type: web
    name: vakilconnect
    runtime: node
    plan: free
    region: singapore
    buildCommand: "echo 'No build step required — zero-dep server'"
    startCommand: "node --experimental-sqlite server-nodeps.js"
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
